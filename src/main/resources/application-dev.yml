spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false # Disabled in dev until schema stabilizes

logging:
  level:
    com.slotbooking: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
